name: Bug report
description: Report a defect in a GLASS Padel application or service
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please provide enough detail for us to
        reproduce it. Do not include any secrets, credentials or personal data.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear, concise description of the problem.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: The exact sequence that triggers the bug.
      placeholder: |
        1. Go to ...
        2. Do ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened, including any error messages.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Web app
        - Mobile app
        - Backend / API
        - Infrastructure
        - Not sure
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Device, OS, app version or browser, where relevant.
      placeholder: "e.g. iPhone 14, iOS 17.4, app v2.1.0"
    validations:
      required: false
